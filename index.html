<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminplaner - Notfall-Grammetal</title>
<style>
:root{--dark:#07162f;--surface:#0d2144;--red:#ff2b2b;--blue:#2aa3ff;--border:rgba(42,163,255,0.25);--text:#e8f4ff;--muted:#7aabcf;--green:#22c55e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--dark);color:var(--text);}
.hdr{background:var(--surface);border-bottom:2px solid var(--red);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.logo{font-size:15px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:8px;}
.rdot{width:10px;height:10px;border-radius:50%;background:var(--red);}
.tabs{display:flex;gap:6px;}
.tab{padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.main{padding:20px;max-width:700px;margin:0 auto;}
.pnl{display:none;}.pnl.active{display:block;}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cnav h2{font-size:17px;font-weight:700;color:var(--blue);}
.cbtn{background:transparent;border:1px solid var(--border);color:var(--blue);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:18px;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.clbl{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;font-weight:700;}
.cday{text-align:center;padding:8px 2px 4px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid transparent;min-height:40px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.cday.empty,.cday.past{cursor:default;opacity:0.3;}
.cday.has-slots{border-color:var(--border);}
.cday.has-slots:hover{border-color:var(--blue);background:rgba(42,163,255,0.1);}
.cday.selected{background:var(--blue)!important;color:#fff!important;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.sbox{background:var(--surface);border-radius:10px;padding:18px;border:1px solid var(--border);margin-bottom:16px;}
.stit{font-size:14px;color:var(--text);margin-bottom:16px;font-weight:600;}
.time-row{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;}
.ff label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.ff select{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;cursor:pointer;}
.ff select:focus{outline:none;border-color:var(--blue);}
.ff select option{background:var(--dark);}
.btn-slot{padding:10px 24px;background:var(--green);border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer;}
.booked-item{display:inline-block;padding:4px 10px;border-radius:5px;border:1px solid var(--red);color:var(--red);font-size:12px;margin:3px;opacity:0.7;}
.booked-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.bfrm{background:var(--surface);border-radius:10px;padding:18px;border:1px solid var(--green);margin-top:16px;}
.bfrm h3{font-size:14px;color:var(--green);margin-bottom:14px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ff2 label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
.ff2 input,.ff2 select,.ff2 textarea{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:6px;padding:9px 11px;color:var(--text);font-size:13px;}
.ff2 textarea{resize:vertical;min-height:60px;}
.bbtn{width:100%;padding:12px;background:var(--red);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.alog{max-width:340px;margin:40px auto;background:var(--surface);border-radius:12px;padding:28px;border:1px solid var(--border);}
.alog h3{color:var(--blue);font-size:16px;margin-bottom:18px;}
.abox{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:16px;}
.abox h3{color:var(--blue);font-size:14px;margin-bottom:12px;}
.abtn{background:var(--blue);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:10px 22px;cursor:pointer;}
.abtn.grn{background:var(--green);color:#000;}
.filt{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.fbtn{padding:5px 14px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}
.fbtn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.apt{background:var(--surface);border-radius:8px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.apt.bs{border-left:3px solid var(--red);}
.at{font-weight:700;color:var(--blue);font-size:13px;}
.bdg{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700;}
.bdg.b{background:rgba(255,43,43,0.2);color:var(--red);}
.dbtn{background:transparent;border:1px solid rgba(255,43,43,0.4);color:var(--red);border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;}
.ns{color:var(--muted);font-size:13px;text-align:center;padding:20px 0;}
.sy{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(255,43,43,0.2);color:var(--red);margin-left:8px;}
.sy.live{background:rgba(34,197,94,0.2);color:var(--green);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
#toast.show{opacity:1;}
#toast.e{background:var(--red);color:#fff;}
@media(max-width:480px){.fr{grid-template-columns:1fr;}.time-row{flex-direction:column;}.hdr{flex-direction:column;}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="rdot"></div>Notfall-Grammetal &middot; Termine<span id="sy" class="sy">&#9679; Verbinde...</span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('k')">Termin buchen</button>
    <button class="tab" onclick="switchTab('a')">Admin</button>
  </div>
</div>
<div class="main">
  <div id="pk" class="pnl active">
    <div class="cnav" style="margin-top:10px">
      <button class="cbtn" onclick="changeMonth(-1)">&#8249;</button>
      <h2 id="ct"></h2>
      <button class="cbtn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cgrid" id="cg"></div>
    <div class="sbox" id="sbox" style="display:none">
      <div class="stit" id="sti"></div>
      <div class="time-row">
        <div class="ff">
          <label>Wunschzeit (08:00 - 16:00)</label>
          <select id="timesel">
            <option value="08:00">08:00 Uhr</option>
            <option value="08:30">08:30 Uhr</option>
            <option value="09:00">09:00 Uhr</option>
            <option value="09:30">09:30 Uhr</option>
            <option value="10:00">10:00 Uhr</option>
            <option value="10:30">10:30 Uhr</option>
            <option value="11:00">11:00 Uhr</option>
            <option value="11:30">11:30 Uhr</option>
            <option value="12:00">12:00 Uhr</option>
            <option value="12:30">12:30 Uhr</option>
            <option value="13:00">13:00 Uhr</option>
            <option value="13:30">13:30 Uhr</option>
            <option value="14:00">14:00 Uhr</option>
            <option value="14:30">14:30 Uhr</option>
            <option value="15:00">15:00 Uhr</option>
            <option value="15:30">15:30 Uhr</option>
            <option value="16:00">16:00 Uhr</option>
          </select>
        </div>
        <button class="btn-slot" onclick="selectTime()">Weiter &#8594;</button>
      </div>
      <div id="booked-box" style="display:none;margin-top:14px">
        <div class="booked-label">Bereits vergeben:</div>
        <div id="booked-times"></div>
      </div>
    </div>
    <div id="bf" style="display:none">
      <div class="bfrm">
        <h3 id="bh">Termin buchen</h3>
        <div class="fr">
          <div class="ff2"><label>Vorname</label><input type="text" id="fn" placeholder="Max"></div>
          <div class="ff2"><label>Nachname</label><input type="text" id="ln" placeholder="Mustermann"></div>
        </div>
        <div class="fr">
          <div class="ff2"><label>Telefon</label><input type="tel" id="ph" placeholder="0157..."></div>
          <div class="ff2"><label>Service</label>
            <select id="sv">
              <option>Schluesseldienst</option>
              <option>PC-Notdienst</option>
              <option>Hausmeisterservice</option>
              <option>Einkaufservice</option>
              <option>Sicherheitsprodukte</option>
            </select>
          </div>
        </div>
        <div class="fr" style="grid-template-columns:1fr">
          <div class="ff2"><label>Anmerkung (optional)</label><textarea id="nt" placeholder="Kurze Beschreibung..."></textarea></div>
        </div>
        <button class="bbtn" id="bb" onclick="confirmBook()">Termin verbindlich buchen</button>
      </div>
    </div>
  </div>
  <div id="pa" class="pnl">
    <div id="alw" style="margin-top:10px">
      <div class="alog">
        <h3>Admin-Zugang</h3>
        <div class="ff2" style="margin-bottom:14px"><label>Passwort</label><input type="password" id="pw" onkeydown="if(event.key==='Enter')adminLogin()"></div>
        <button class="abtn" style="width:100%" onclick="adminLogin()">Einloggen</button>
      </div>
    </div>
    <div id="am" style="display:none;margin-top:10px">
      <div class="abox">
        <h3>Automatik</h3>
        <div style="font-size:12px;color:var(--muted);line-height:1.7;">
          <b style="color:var(--blue)">Mo-Fr, 08:00-16:00, 3 Monate Voraus</b><br>
          Kunden waehlen ihre Wunschzeit.<br>
          <button class="abtn grn" onclick="runAutoSlots(true)" style="margin-top:10px;font-size:12px;padding:7px 16px;">Jetzt generieren</button>
        </div>
      </div>
      <div class="filt">
        <button class="fbtn active" onclick="setFilter('all',this)">Alle</button>
        <button class="fbtn" onclick="setFilter('booked',this)">Gebucht</button>
      </div>
      <div id="alist"><div class="ns">Lade...</div></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA1W8H0gslsoEzJ7TlTflqAFRgYikUZCFQ",
  authDomain:"notfall-grammetal-d1a88.firebaseapp.com",
  databaseURL:"https://notfall-grammetal-d1a88-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"notfall-grammetal-d1a88",
  storageBucket:"notfall-grammetal-d1a88.firebasestorage.app",
  messagingSenderId:"294854829770",
  appId:"1:294854829770:web:0ab2aa5b060319a7e7b633"
});
var db=firebase.database();
var PW='notfall2024';
var MO=['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var DA=['Mo','Di','Mi','Do','Fr','Sa','So'];
var vM=new Date().getMonth(),vY=new Date().getFullYear();
var sD=null,sT=null,fi='all',slots={},adm=false;

db.ref('slots').on('value',function(s){
  slots=s.val()||{};
  var e=document.getElementById('sy');
  if(e){e.textContent='Live';e.className='sy live';}
  renderCal();
  if(sD)showDayInfo(sD);
  if(adm)renderAdmin();
  checkAutoSlots();
},function(){
  var e=document.getElementById('sy');
  if(e){e.textContent='Offline';e.className='sy';}
});

function checkAutoSlots(){
  db.ref('lastAutoCheck').once('value',function(s){
    var last=s.val()||0;
    if(Date.now()-last>3600000){
      db.ref('lastAutoCheck').set(Date.now());
      runAutoSlots(false);
    }
  });
}

function runAutoSlots(showMsg){
  var today=new Date();today.setHours(0,0,0,0);
  var end=new Date(today);end.setMonth(end.getMonth()+3);
  var cur=new Date(today);cur.setDate(cur.getDate()+1);
  var added=0;
  while(cur<=end){
    var dow=cur.getDay();
    if(dow>=1&&dow<=5){
      var ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
      var exists=Object.values(slots).some(function(sl){return sl.date===ds&&sl.type==='day';});
      if(!exists){
        var id='d'+Date.now().toString(36)+Math.random().toString(36).substr(2,4);
        db.ref('slots/'+id).set({date:ds,type:'day',bookings:null});
        added++;
      }
    }
    cur.setDate(cur.getDate()+1);
  }
  if(showMsg)showToast(added>0?added+' Tage freigegeben!':'Alle Tage vorhanden.');
}

function getBookingsForDay(ds){
  var booked=[];
  Object.values(slots).forEach(function(sl){
    if(sl.date===ds&&sl.type==='booking'&&sl.booked)booked.push(sl.time);
  });
  return booked;
}

function isDayAvailable(ds){
  return Object.values(slots).some(function(sl){return sl.date===ds&&sl.type==='day';});
}

function showToast(m,e){
  var t=document.getElementById('toast');
  t.textContent=m;t.className='show'+(e?' e':'');
  setTimeout(function(){t.className='';},3000);
}
function fmtDate(d){var p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.classList.toggle('active',(t==='k'&&i===0)||(t==='a'&&i===1));
  });
  document.getElementById('pk').classList.toggle('active',t==='k');
  document.getElementById('pa').classList.toggle('active',t==='a');
}

function adminLogin(){
  if(document.getElementById('pw').value===PW){
    adm=true;
    document.getElementById('alw').style.display='none';
    document.getElementById('am').style.display='block';
    renderAdmin();
  }else showToast('Falsches Passwort',true);
}

function changeMonth(d){
  vM+=d;if(vM>11){vM=0;vY++;}if(vM<0){vM=11;vY--;}
  sD=null;sT=null;
  document.getElementById('sbox').style.display='none';
  document.getElementById('bf').style.display='none';
  renderCal();
}

function renderCal(){
  document.getElementById('ct').textContent=MO[vM]+' '+vY;
  var g=document.getElementById('cg');
  g.innerHTML=DA.map(function(d){return'<div class="clbl">'+d+'</div>';}).join('');
  var first=new Date(vY,vM,1),dow=first.getDay();
  dow=dow===0?6:dow-1;
  for(var i=0;i<dow;i++)g.innerHTML+='<div class="cday empty"></div>';
  var dim=new Date(vY,vM+1,0).getDate();
  var tod=new Date().toISOString().split('T')[0];
  for(var d=1;d<=dim;d++){
    var mm=String(vM+1).padStart(2,'0'),dd=String(d).padStart(2,'0'),ds=vY+'-'+mm+'-'+dd;
    var avail=isDayAvailable(ds);
    var past=ds<=tod;
    var isSel=ds===sD;
    var cls='cday'+(past?' past':(!past&&avail?' has-slots':''))+(isSel?' selected':'');
    var dot=(!past&&avail)?'<div class="dot"></div>':'';
    var cl=(!past&&avail)?'onclick="selectDay(\''+ds+'\')"':'';
    g.innerHTML+='<div class="'+cls+'" '+cl+'><span>'+d+'</span>'+dot+'</div>';
  }
}

function selectDay(ds){
  sD=ds;sT=null;
  document.getElementById('bf').style.display='none';
  renderCal();
  showDayInfo(ds);
}

function showDayInfo(ds){
  var p=ds.split('-');
  document.getElementById('sbox').style.display='block';
  document.getElementById('sti').textContent=p[2]+'.'+p[1]+'.'+p[0]+' - Wunschzeit waehlen:';
  var booked=getBookingsForDay(ds);
  var bbox=document.getElementById('booked-box');
  var btimes=document.getElementById('booked-times');
  var sel=document.getElementById('timesel');
  if(booked.length>0){
    bbox.style.display='block';
    btimes.innerHTML=booked.sort().map(function(t){return'<span class="booked-item">'+t+' Uhr</span>';}).join('');
    for(var i=0;i<sel.options.length;i++){
      var v=sel.options[i].value;
      sel.options[i].disabled=booked.indexOf(v)>-1;
      sel.options[i].text=v+' Uhr'+(booked.indexOf(v)>-1?' (vergeben)':'');
    }
    for(var j=0;j<sel.options.length;j++){if(!sel.options[j].disabled){sel.selectedIndex=j;break;}}
  }else{
    bbox.style.display='none';
    for(var k=0;k<sel.options.length;k++){sel.options[k].disabled=false;sel.options[k].text=sel.options[k].value+' Uhr';}
    sel.selectedIndex=0;
  }
}

function selectTime(){
  var sel=document.getElementById('timesel');
  if(sel.options[sel.selectedIndex].disabled){showToast('Diese Zeit ist vergeben!',true);return;}
  sT=sel.value;
  var p=sD.split('-');
  document.getElementById('bf').style.display='block';
  document.getElementById('bh').textContent='Termin: '+p[2]+'.'+p[1]+'.'+p[0]+' um '+sT+' Uhr';
}

function confirmBook(){
  var fn=document.getElementById('fn').value.trim();
  var ln=document.getElementById('ln').value.trim();
  var ph=document.getElementById('ph').value.trim();
  var sv=document.getElementById('sv').value;
  var nt=document.getElementById('nt').value.trim();
  if(!fn||!ln||!ph){showToast('Bitte Name und Telefon ausfuellen',true);return;}
  if(!sD||!sT){showToast('Bitte Tag und Zeit waehlen',true);return;}
  var booked=getBookingsForDay(sD);
  if(booked.indexOf(sT)>-1){showToast('Zeit gerade vergeben!',true);showDayInfo(sD);return;}
  var btn=document.getElementById('bb');
  btn.disabled=true;btn.textContent='Wird gebucht...';
  var id='b'+Date.now().toString(36)+Math.random().toString(36).substr(2,5);
  db.ref('slots/'+id).set({date:sD,time:sT,type:'booking',booked:true,
    customer:{name:fn+' '+ln,phone:ph,service:sv,note:nt,ts:Date.now()}
  }).then(function(){
    btn.disabled=false;btn.textContent='Termin verbindlich buchen';
    document.getElementById('bf').style.display='none';
    ['fn','ln','ph','nt'].forEach(function(x){document.getElementById(x).value='';});
    sT=null;showToast('Termin erfolgreich gebucht!');showDayInfo(sD);
  }).catch(function(){
    btn.disabled=false;btn.textContent='Termin verbindlich buchen';
    showToast('Fehler.',true);
  });
}

function setFilter(f,el){
  fi=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');renderAdmin();
}

function renderAdmin(){
  var list=document.getElementById('alist');if(!list)return;
  var today=new Date().toISOString().split('T')[0];
  var bookings=Object.entries(slots).filter(function(e){
    return e[1].type==='booking'&&e[1].date>=today;
  }).map(function(e){return Object.assign({id:e[0]},e[1]);});
  bookings.sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});
  if(!bookings.length){list.innerHTML='<div class="ns">Keine Buchungen</div>';return;}
  list.innerHTML=bookings.map(function(s){
    return'<div class="apt bs"><div><div class="at">'+fmtDate(s.date)+' '+s.time+' Uhr</div>'+
    '<div style="color:var(--text);font-size:13px">'+(s.customer&&s.customer.name||'')+' &middot; '+(s.customer&&s.customer.phone||'')+'</div>'+
    '<div style="color:var(--muted);font-size:12px">'+(s.customer&&s.customer.service||'')+'</div></div>'+
    '<div><span class="bdg b">Gebucht</span> <button class="dbtn" onclick="deleteSlot(\''+s.id+'\')">&#x2715;</button></div></div>';
  }).join('');
}

function deleteSlot(id){
  db.ref('slots/'+id).remove().then(function(){showToast('Geloescht');}).catch(function(){showToast('Fehler',true);});
}

renderCal();
</script>
</body>
</html>
